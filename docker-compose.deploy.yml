# Deployment compose for the VPS — adapted from IT's intercom-manager compose.
# Runs on the external `v2075` macvlan at a fixed IP and is auto-updated by the
# shared Watchtower (which watches containers carrying the enable label below).
#
# Differences from intercom-manager, by design:
#   • IP 10.44.75.61 (manager is .60)
#   • image reg.p1.riedel.events/intercom-matrix
#   • no BOLERO_PIN (manager-only); admin creds + secrets come from ./.env
#   • config split: systems.json/settings.json in /config, databases in /data
#
# ── ONE-TIME SETUP ON THE SERVER ────────────────────────────────────────────
#   mkdir -p /root/containers/intercom-matrix/{data,config}
#   # The image runs as the non-root `node` user (uid 1000); give it ownership
#   # of the bind mounts or it can't write the request/auth DBs or persist config:
#   chown -R 1000:1000 /root/containers/intercom-matrix/data /root/containers/intercom-matrix/config
#   # Drop the systems list + deployment settings in (controller IPs etc.):
#   cp systems.example.json  /root/containers/intercom-matrix/config/systems.json
#   cp settings.example.json /root/containers/intercom-matrix/config/settings.json
#   # Secrets live next to this compose, NEVER in git (see .env block below):
#   #   /root/containers/intercom-matrix/.env
#   docker login reg.p1.riedel.events     # one-time; lets the shared Watchtower pull
#   docker compose -f docker-compose.deploy.yml pull
#   docker compose -f docker-compose.deploy.yml up -d
#
# Reachable at http://10.44.75.61/ on the v2075 network (PORT=80 in-container).
#
# ── /root/containers/intercom-matrix/.env (create by hand; keep out of git) ──
#   LOCAL_ADMIN_USER=admin
#   LOCAL_ADMIN_PASS=<choose-a-strong-password>
#   # Optional but recommended — pin the at-rest encryption key (32 bytes base64):
#   #   IMX_SECRET_KEY=<openssl rand -base64 32>
#   # If omitted, a key is generated once and persisted to /data/.secret-key.

services:
  intercom-matrix:
    image: reg.p1.riedel.events/intercom-matrix:latest
    container_name: intercom-matrix
    restart: always
    volumes:
      # Request / auth / vault databases (REQUESTS_DIR below points here).
      - /root/containers/intercom-matrix/data:/data
      # Writable config: systems.json (controller IPs) + settings.json (branding).
      - /root/containers/intercom-matrix/config:/config
    environment:
      - PORT=80
      - REQUESTS_DIR=/data
      - SYSTEMS_FILE=/config/systems.json
      - SETTINGS_FILE=/config/settings.json
      # Live RRCS polling is off until systems.json has reachable hosts:
      # - RRCS_ENABLED=on
    env_file:
      # Admin credentials + optional IMX_SECRET_KEY — kept out of git.
      - .env
    networks:
      v2075:
        ipv4_address: 10.44.75.61
    labels:
      - com.centurylinklabs.watchtower.enable=true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  v2075:
    name: v2075
    external: true
