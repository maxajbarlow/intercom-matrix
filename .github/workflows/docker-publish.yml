# Build and publish the Docker image to the GitHub Container Registry (GHCR)
# so anyone can run the app with a single `docker run` — no clone, no build.
#
# Publishes ghcr.io/<owner>/<repo> on every push to main and on version tags
# (v1.2.3). Uses the built-in GITHUB_TOKEN — no Docker Hub account or secrets.
#
# ONE-TIME after the first successful run: open the repo's Packages, select the
# image, and set its visibility to Public so `docker run` works without login.

name: Publish Docker image

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # QEMU + Buildx enable building the arm64 image alongside amd64.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # metadata-action lowercases the image name automatically (GHCR requires it).
      - name: Derive tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=sha,format=short

      - name: Build and push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
